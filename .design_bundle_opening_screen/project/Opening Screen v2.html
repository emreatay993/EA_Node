<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>COREX · Opening Screen · V1 & V2 variations</title>
<style>
  html, body { margin: 0; padding: 0; background: #05080F; color: #E6EEFB;
    font-family: "Segoe UI", "Segoe UI Variable", Inter, system-ui, sans-serif; }
  #root { min-height: 100vh; }
  @keyframes corexSheen { 0% { transform: translateX(-120%); } 100% { transform: translateX(340%); } }
  @keyframes corexCaret { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
  @keyframes corexLogIn { from { opacity:0; transform: translateX(-4px) } to { opacity:1; transform: translateX(0) } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="splash/tokens.jsx"></script>
<script type="text/babel" src="splash/v1_variations.jsx"></script>
<script type="text/babel" src="splash/v2_variations.jsx"></script>

<script type="text/babel">
const FG='#E6EEFB', FG_MUTED='#8895B2', FG_DIM='#4A566F', RULE='#1F2A40';

function Cell({ idx, fam, title, subtitle, chips=[], notes, children }) {
  return (
    <div style={{ position:'relative', flexShrink:0 }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 1.8,
          textTransform:'uppercase', fontWeight:600,
          fontFamily:'"Cascadia Mono", Consolas, monospace' }}>
          {fam} · {idx}
        </div>
        <div style={{ fontSize: 20, fontWeight: 600, color: FG, marginTop: 4, letterSpacing: -0.2 }}>{title}</div>
        <div style={{ fontSize: 12.5, color: FG_MUTED, marginTop: 2 }}>{subtitle}</div>
      </div>
      {children}
      <div style={{ width: 720, marginTop: 16, color: FG_MUTED, fontSize: 12, lineHeight: 1.55 }}>
        <div style={{ display:'flex', gap: 8, marginBottom: 8, flexWrap:'wrap' }}>
          {chips.map((c,i) => (
            <span key={i} style={{
              fontSize: 9.5, textTransform:'uppercase', letterSpacing: 1.2,
              padding: '3px 8px', border: `1px solid ${RULE}`, borderRadius: 2,
              color: FG_MUTED, fontWeight: 500,
            }}>{c}</span>
          ))}
        </div>
        <div style={{ maxWidth: 660 }}>{notes}</div>
      </div>
    </div>
  );
}

function FamilyHeader({ eyebrow, title, blurb }) {
  return (
    <div style={{
      gridColumn: '1 / -1', padding: '32px 0 12px',
      borderBottom: `1px solid ${RULE}`, marginBottom: 24,
    }}>
      <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform:'uppercase',
        fontWeight: 600, fontFamily:'"Cascadia Mono", Consolas, monospace' }}>{eyebrow}</div>
      <div style={{ fontSize: 28, fontWeight: 600, color: FG, marginTop: 8, letterSpacing: -0.3 }}>{title}</div>
      <div style={{ fontSize: 13.5, color: FG_MUTED, marginTop: 8, maxWidth: 820, lineHeight: 1.6 }}>{blurb}</div>
    </div>
  );
}

function App() {
  return (
    <div style={{
      minHeight: '100vh', background: '#05080F',
      paddingBottom: 100,
      backgroundImage:
        `radial-gradient(circle at 20% 10%, rgba(47,107,255,0.06), transparent 50%),` +
        `radial-gradient(circle at 80% 80%, rgba(0,209,255,0.04), transparent 50%)`,
    }}>
      <div style={{ padding: '56px 64px 0', maxWidth: 1200 }}>
        <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform: 'uppercase',
          fontWeight: 600, fontFamily: '"Cascadia Mono", Consolas, monospace' }}>COREX · iteration 2</div>
        <h1 style={{ fontSize: 32, fontWeight: 600, color: FG, margin: '10px 0 12px', letterSpacing: -0.5 }}>
          Opening screen — 4 directions each for V1 and V2
        </h1>
        <p style={{ fontSize: 14, color: FG_MUTED, lineHeight: 1.6, maxWidth: 760, margin: 0 }}>
          Same 720×440 frameless splash, same palette. V1 pushes the logo as hero in four
          different rhythms; V2 treats the splash as the canvas and explores four graph
          shapes (linear, vertical, fan-in, and a pre-built workspace).
        </p>
      </div>

      <div style={{ padding: '16px 64px 0', display:'grid',
        gridTemplateColumns: 'repeat(auto-fill, 720px)',
        gap: '60px 64px', justifyContent:'start' }}>

        <FamilyHeader
          eyebrow="Family 01 — Brand-forward"
          title="Forging Core · variations"
          blurb="The COREX mark is the hero in all four. They differ in pacing, composition, and how much supporting information sits alongside the logo."
        />

        <Cell idx="1A" fam="Forging Core" title="Monolith"
          subtitle="Static, oversized mark. Only the core breathes."
          chips={['minimal', 'most stately']}
          notes={<>The simplest reading. No assembly choreography — the logo is always present; the core pulses on a 2.4s loop. Best if the splash should feel confident and unadorned. Works well at 1–2s durations.</>}>
          <V1A_Monolith />
        </Cell>

        <Cell idx="1B" fam="Forging Core" title="Ignition"
          subtitle="Reverse assembly — core ignites first, rings snap outward."
          chips={['dynamic', 'reads left-to-right']}
          notes={<>A radial flash fires from the center, connectors project outward, then the four outer rings snap into place. Reads as "the core is live; it's reaching out to the rest of the system" — opposite narrative of the original 01.</>}>
          <V1B_Ignition />
        </Cell>

        <Cell idx="1C" fam="Forging Core" title="Offset mark"
          subtitle="Logo on the left; live task list on the right."
          chips={['informative', 'dialog-like']}
          notes={<>Logo sits in a 240px left column with a vertical rule; right column carries the wordmark and a ticking checklist (Runtime · Registry · DPF · Workspace) with OK / … / idle markers. Strongest fit if boot takes more than 2s and you want the user to see what's happening.</>}>
          <V1C_OffsetMark />
        </Cell>

        <Cell idx="1D" fam="Forging Core" title="Constellation"
          subtitle="Scattered rings collapse into the canonical logo."
          chips={['narrative', 'convergence']}
          notes={<>A scatter of 22 small rings drift on the dot grid; on the boot tick they fade and pull inward, leaving only the four canonical positions that snap into place. Reads as "the graph is resolving itself" — thematic match to the registry warmup.</>}>
          <V1D_Constellation />
        </Cell>

        <FamilyHeader
          eyebrow="Family 02 — Canvas-native"
          title="Graph Assembly · variations"
          blurb="The splash already IS the editor. All four use the real canvas grid, category-coded node cards, and warm-yellow ports. They differ in the shape and scale of the graph."
        />

        <Cell idx="2A" fam="Graph Assembly" title="Linear pipeline"
          subtitle="Four nodes, left-to-right: Read → Transform → Solve → Plot."
          chips={['classic flow', 'reads at a glance']}
          notes={<>A canonical four-stage dataflow, each node category-coded (I/O blue → Logic purple → Physics orange → I/O green). Edges draw in sequentially, then a data pulse traces the whole pipeline. Longer, more "real workflow" feel than the 3-node original.</>}>
          <V2A_Linear />
        </Cell>

        <Cell idx="2B" fam="Graph Assembly" title="Vertical waterfall"
          subtitle="Top-down flow with session metadata alongside."
          chips={['session-aware', 'restore context']}
          notes={<>Nodes stack vertically on the right; left side shows "Restoring session" with file, node count, edge count, theme. Best if the splash is reached after double-clicking a <span style={{fontFamily:'"Cascadia Mono", Consolas, monospace'}}>.sfe</span> file — gives the user confirmation of what's opening.</>}>
          <V2B_Vertical />
        </Cell>

        <Cell idx="2C" fam="Graph Assembly" title="Fan-in cluster"
          subtitle="Four inputs feed a central DPF solver."
          chips={['subgraph', 'dpf-forward']}
          notes={<>Mesh, Materials, Loads, Constraints feed a central Solve node with four bezier edges converging from the corners. The solver pulses "running" while inputs stream data pulses. Strong visual if DPF / simulation is the product's headline use case.</>}>
          <V2C_FanIn />
        </Cell>

        <Cell idx="2D" fam="Graph Assembly" title="Workspace zoom"
          subtitle="Pre-built 6-node graph; execution ripples through."
          chips={['most realistic', 'with minimap']}
          notes={<>A finished 6-node graph fills the frame — no assembly. Edges pulse sequentially to show execution order; each node transitions idle → running → completed as the wave passes. A small minimap sits bottom-right. Feels like a real workspace being restored and stepped through.</>}>
          <V2D_CanvasZoom />
        </Cell>

        <div style={{
          width: 720, padding: '24px 30px', border: `1px dashed ${RULE}`, borderRadius: 8,
          color: FG_MUTED, fontSize: 13, lineHeight: 1.6, alignSelf:'start',
          background: 'rgba(47,107,255,0.02)',
        }}>
          <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform:'uppercase',
            fontWeight: 600, fontFamily:'"Cascadia Mono", Consolas, monospace', marginBottom: 10 }}>
            Direction to pick
          </div>
          <ul style={{ paddingLeft: 18, margin: 0 }}>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>1A Monolith</strong> — confident, brandy, sub-2s friendly.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>1B Ignition</strong> — dynamic, same footprint as the original but opposite choreography.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>1C Offset</strong> — when boot is long and status matters.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>1D Constellation</strong> — most narrative; registry "converging" into the logo.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>2A Linear</strong> — most readable flow.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>2B Vertical</strong> — tied to session restore.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>2C Fan-in</strong> — DPF-forward.</li>
            <li><strong style={{ color: FG }}>2D Workspace</strong> — most convincing "already running" illusion.</li>
          </ul>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
