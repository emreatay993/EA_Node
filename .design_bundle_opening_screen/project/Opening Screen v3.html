<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>COREX · Opening Screen · V3 — Monolith & Concept variations</title>
<style>
  html, body { margin: 0; padding: 0; background: #05080F; color: #E6EEFB;
    font-family: "Segoe UI", "Segoe UI Variable", Inter, system-ui, sans-serif; }
  #root { min-height: 100vh; }
  @keyframes corexSheen { 0% { transform: translateX(-120%); } 100% { transform: translateX(340%); } }
  @keyframes corexCaret { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
  @keyframes corexLogIn { from { opacity:0; transform: translateX(-4px) } to { opacity:1; transform: translateX(0) } }
  @keyframes corexScan { 0% { transform: translateY(-120%) } 100% { transform: translateY(140%) } }
  @keyframes corexRing { 0% { r: 40; opacity:0.7 } 100% { r: 180; opacity: 0 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="splash/tokens.jsx"></script>
<script type="text/babel" src="splash/v1_variations.jsx"></script>
<script type="text/babel" src="splash/monolith_variants.jsx"></script>
<script type="text/babel" src="splash/concept_variants.jsx"></script>

<script type="text/babel">
const FG='#E6EEFB', FG_MUTED='#8895B2', FG_DIM='#4A566F', RULE='#1F2A40';

// Tweakable defaults — persisted to disk when user adjusts Tweaks.
const TWEAKS = /*EDITMODE-BEGIN*/{
  "m1LogoSize": 188,
  "m1BreatheDur": 2,
  "m6LogoSize": 210,
  "m6BreatheDur": 2
}/*EDITMODE-END*/;

function Cell({ idx, fam, title, subtitle, chips=[], notes, children }) {
  return (
    <div style={{ position:'relative', flexShrink:0 }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 1.8,
          textTransform:'uppercase', fontWeight:600,
          fontFamily:'"Cascadia Mono", Consolas, monospace' }}>
          {fam} · {idx}
        </div>
        <div style={{ fontSize: 20, fontWeight: 600, color: FG, marginTop: 4, letterSpacing: -0.2 }}>{title}</div>
        <div style={{ fontSize: 12.5, color: FG_MUTED, marginTop: 2 }}>{subtitle}</div>
      </div>
      {children}
      <div style={{ width: 720, marginTop: 16, color: FG_MUTED, fontSize: 12, lineHeight: 1.55 }}>
        <div style={{ display:'flex', gap: 8, marginBottom: 8, flexWrap:'wrap' }}>
          {chips.map((c,i) => (
            <span key={i} style={{
              fontSize: 9.5, textTransform:'uppercase', letterSpacing: 1.2,
              padding: '3px 8px', border: `1px solid ${RULE}`, borderRadius: 2,
              color: FG_MUTED, fontWeight: 500,
            }}>{c}</span>
          ))}
        </div>
        <div style={{ maxWidth: 660 }}>{notes}</div>
      </div>
    </div>
  );
}

function FamilyHeader({ eyebrow, title, blurb }) {
  return (
    <div style={{
      gridColumn: '1 / -1', padding: '32px 0 12px',
      borderBottom: `1px solid ${RULE}`, marginBottom: 24,
    }}>
      <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform:'uppercase',
        fontWeight: 600, fontFamily:'"Cascadia Mono", Consolas, monospace' }}>{eyebrow}</div>
      <div style={{ fontSize: 28, fontWeight: 600, color: FG, marginTop: 8, letterSpacing: -0.3 }}>{title}</div>
      <div style={{ fontSize: 13.5, color: FG_MUTED, marginTop: 8, maxWidth: 820, lineHeight: 1.6 }}>{blurb}</div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setShowTweaks(true);
      else if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function updateTweak(key, value) {
    setTweaks(t => ({ ...t, [key]: value }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  }

  return (
    <div style={{
      minHeight: '100vh', background: '#05080F',
      paddingBottom: 100,
      backgroundImage:
        `radial-gradient(circle at 20% 10%, rgba(47,107,255,0.06), transparent 50%),` +
        `radial-gradient(circle at 80% 80%, rgba(0,209,255,0.04), transparent 50%)`,
    }}>
      <div style={{ padding: '56px 64px 0', maxWidth: 1200 }}>
        <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform: 'uppercase',
          fontWeight: 600, fontFamily: '"Cascadia Mono", Consolas, monospace' }}>COREX · iteration 3</div>
        <h1 style={{ fontSize: 32, fontWeight: 600, color: FG, margin: '10px 0 12px', letterSpacing: -0.5 }}>
          Opening screen — 5 Monolith variants &amp; 5 Concept-node variants
        </h1>
        <p style={{ fontSize: 14, color: FG_MUTED, lineHeight: 1.6, maxWidth: 820, margin: 0 }}>
          Two families, five variants each. The <strong style={{ color: FG }}>Monolith</strong> row
          keeps the logo alone as hero — exploring how breathing, pulse-rings, halos, oversized
          scale, and scan-lines change its character. The <strong style={{ color: FG }}>Concept-node</strong> row
          wires the logo to the product's workflow stages (Plan · Model · Process · Solve · Plot · Report)
          in five arrangements so the splash doubles as a one-glance product explainer.
        </p>
      </div>

      <div style={{ padding: '16px 64px 0', display:'grid',
        gridTemplateColumns: 'repeat(auto-fill, 720px)',
        gap: '60px 64px', justifyContent:'start' }}>

        <FamilyHeader
          eyebrow="Family 03 — Monolith variations"
          title="The logo as the whole screen"
          blurb="Same frame, same palette, same wordmark — only the logo's behavior changes. From calm breathing to a horizontal scan sweep, each one tests a different temperament for a 2–5s boot."
        />

        <Cell idx="M1" fam="Monolith" title="Breathe"
          subtitle="Refined baseline — the core pulses at 2.4s, rings stay still."
          chips={['calm', 'timeless', 'tweakable']}
          notes={<>The most restrained reading. The core breathes gently; nothing else moves. Best default — works whether the boot takes 1.5s or 5s without feeling hurried or slow. <strong style={{ color: FG }}>Tweakable:</strong> logo size and breathing duration — toggle Tweaks in the toolbar to adjust.</>}>
          <M1_Breathe size={tweaks.m1LogoSize} breatheDur={tweaks.m1BreatheDur} />
        </Cell>

        <Cell idx="M2" fam="Monolith" title="Pulse-out"
          subtitle="A concentric ring emits from the core on every boot step."
          chips={['rhythmic', 'step-aware']}
          notes={<>Each boot-step tick fires a soft cyan ring that expands and fades past the logo bounds. Gives the progress bar a visual echo in the mark itself — good when you want the splash to feel like it's doing work.</>}>
          <M2_PulseOut />
        </Cell>

        <Cell idx="M3" fam="Monolith" title="Rotating halo"
          subtitle="Slowly rotating orbit ring behind the mark."
          chips={['mechanical', 'technical']}
          notes={<>A faint dashed orbit with a cyan sweep rotates at ~8s/rev behind the logo. Reads as "the system is live" without distracting from the core. Closest to a traditional indeterminate spinner, restated in COREX's language.</>}>
          <M3_Halo />
        </Cell>

        <Cell idx="M4" fam="Monolith" title="Huge"
          subtitle="Oversized mark bleeds past top &amp; bottom; wordmark stacked at right."
          chips={['bold', 'poster-like']}
          notes={<>Cinematic composition. The logo is cropped generously and sits left-of-center; the wordmark and version info stack vertically at the right edge like film-title chrome. Most confident and marketing-leaning of the five.</>}>
          <M4_Huge />
        </Cell>

        <Cell idx="M5" fam="Monolith" title="Scan"
          subtitle="A thin horizontal scan-line sweeps across the mark."
          chips={['diagnostic', 'engineering']}
          notes={<>A 2px cyan scan-line travels top-to-bottom across the logo on a ~1.8s loop. Evokes a diagnostic sweep or capture — fits COREX's engineering DNA and pairs naturally with a "Resolving…" progress string.</>}>
          <M5_Scan />
        </Cell>

        <Cell idx="M6" fam="Monolith" title="Schematic"
          subtitle="Mark breathes over a faint PCB-trace backdrop."
          chips={['circuit', 'engineering', 'tweakable']}
          notes={<>The mark still leads, but the empty canvas becomes a subtle printed-circuit field — orthogonal traces, vias, labeled component pads (R12, C03, IC1…), and a few "live" traces carrying a slow cyan pulse. Reads as "COREX is a signal-processing engine" without the pyrotechnics of M2. <strong style={{ color: FG }}>Tweakable:</strong> logo size and breathing duration.</>}>
          <M6_Schematic size={tweaks.m6LogoSize} breatheDur={tweaks.m6BreatheDur} />
        </Cell>

        <FamilyHeader
          eyebrow="Family 04 — Concept nodes"
          title="The logo, wired to what COREX does"
          blurb="The mark is still the anchor, but around it sit labeled concept nodes — the product's verbs. Plan, Model, Process, Solve, Plot, Report. Variants differ in arrangement (cardinal, ring, arc, hex, columns) and which story they tell about the workflow."
        />

        <Cell idx="C1" fam="Concept nodes" title="Compass"
          subtitle="Four cardinal concepts — Plan, Process, Solve, Plot — around the mark."
          chips={['balanced', 'easiest to read']}
          notes={<>Four category-coded nodes on the N/E/S/W axes, connected to the central logo. One edge at a time lights up in cyan as the boot steps through. Cleanest and most symmetrical — reads the fastest.</>}>
          <C1_Compass />
        </Cell>

        <Cell idx="C2" fam="Concept nodes" title="Orbit ring"
          subtitle="Six concepts orbit the logo on a slow dashed ring."
          chips={['kinetic', 'six-stage']}
          notes={<>All six workflow verbs sit on a slowly rotating dashed orbit. Each tick moves the "active" focus one stop around the ring, with a pulsing halo on the current node. Good fit when you want to show the full vocabulary without a strict left-to-right order.</>}>
          <C2_OrbitRing />
        </Cell>

        <Cell idx="C3" fam="Concept nodes" title="Lifecycle arc"
          subtitle="Steps trace an arc from the logo — plan → model → … → plot."
          chips={['narrative', 'sequential']}
          notes={<>The logo anchors the lower-left; five numbered stages rise across a shallow arc. A cyan progress stroke fills the arc one step at a time. Strongest when you want the splash to narrate the product's lifecycle, not just display it.</>}>
          <C3_LifecycleArc />
        </Cell>

        <Cell idx="C4" fam="Concept nodes" title="Hex lattice"
          subtitle="Six concepts at the corners of a hexagon around the mark."
          chips={['geometric', 'full surface']}
          notes={<>Hex geometry implies that the verbs compose rather than sequence — any stage can feed any other. Edges from the center to each vertex light up in rotation; the dashed hex outline underscores the system boundary. Most "engineering CAD" flavored of the five.</>}>
          <C4_HexLattice />
        </Cell>

        <Cell idx="C5" fam="Concept nodes" title="Cascading columns"
          subtitle="Input stages on the left feed the core; output stages fan out right."
          chips={['input / output', 'dataflow']}
          notes={<>Plan/Model/Process on the left, Solve/Plot/Report on the right, the mark in the middle. Explicit INPUT / OUTPUT labels and bezier edges. Clearest "data flows through COREX" reading — closest sibling to V2's canvas-native family, but with verbs instead of node types.</>}>
          <C5_CascadingColumns />
        </Cell>

        <div style={{
          width: 720, padding: '24px 30px', border: `1px dashed ${RULE}`, borderRadius: 8,
          color: FG_MUTED, fontSize: 13, lineHeight: 1.6, alignSelf:'start',
          background: 'rgba(47,107,255,0.02)',
        }}>
          <div style={{ fontSize: 10, color: FG_DIM, letterSpacing: 2, textTransform:'uppercase',
            fontWeight: 600, fontFamily:'"Cascadia Mono", Consolas, monospace', marginBottom: 10 }}>
            Reading guide
          </div>
          <ul style={{ paddingLeft: 18, margin: 0 }}>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M1 Breathe</strong> — calmest; works at any duration.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M2 Pulse-out</strong> — visual echo of boot progress.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M3 Halo</strong> — technical spinner, COREX-flavored.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M4 Huge</strong> — confident poster composition.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M5 Scan</strong> — diagnostic, engineering-forward.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>M6 Schematic</strong> — PCB-trace field behind the mark.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>C1 Compass</strong> — four stages, symmetric.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>C2 Orbit</strong> — six stages on a kinetic ring.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>C3 Lifecycle arc</strong> — narrative sequence.</li>
            <li style={{ marginBottom: 6 }}><strong style={{ color: FG }}>C4 Hex lattice</strong> — composable geometry.</li>
            <li><strong style={{ color: FG }}>C5 Cascading columns</strong> — explicit input→core→output.</li>
          </ul>
        </div>

      </div>

      {/* Floating Tweaks panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', right: 24, bottom: 24, width: 280, zIndex: 1000,
          background: '#0B0F1A', border: `1px solid ${RULE}`, borderRadius: 8,
          boxShadow: '0 8px 24px rgba(0,0,0,0.45)',
          fontFamily: '"Segoe UI", system-ui, sans-serif',
        }}>
          <div style={{
            padding: '10px 14px', borderBottom: `1px solid ${RULE}`,
            display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <div style={{ fontSize: 11, color: FG, fontWeight: 600,
              letterSpacing: 1.4, textTransform: 'uppercase' }}>Tweaks</div>
            <div style={{ fontSize: 9.5, color: FG_DIM, letterSpacing: 1.2,
              textTransform:'uppercase',
              fontFamily:'"Cascadia Mono", Consolas, monospace' }}>M1 &amp; M6</div>
          </div>
          <div style={{ padding: '14px 16px 16px', display:'grid', gap: 16 }}>
            <div style={{ fontSize: 9.5, color: FG_DIM, letterSpacing: 1.4,
              textTransform:'uppercase', fontWeight: 600,
              fontFamily:'"Cascadia Mono", Consolas, monospace' }}>M1 · Breathe</div>
            <TweakSlider label="Logo size"
              value={tweaks.m1LogoSize} min={140} max={280} step={2} suffix=" px"
              onChange={v => updateTweak('m1LogoSize', v)} />
            <TweakSlider label="Breathing duration"
              value={tweaks.m1BreatheDur} min={0.8} max={4.0} step={0.1} suffix=" s"
              hint="Lower = faster pulse"
              onChange={v => updateTweak('m1BreatheDur', Math.round(v * 10) / 10)} />
            <div style={{ height: 1, background: RULE, margin: '2px 0' }} />
            <div style={{ fontSize: 9.5, color: FG_DIM, letterSpacing: 1.4,
              textTransform:'uppercase', fontWeight: 600,
              fontFamily:'"Cascadia Mono", Consolas, monospace' }}>M6 · Schematic</div>
            <TweakSlider label="Logo size"
              value={tweaks.m6LogoSize} min={140} max={280} step={2} suffix=" px"
              onChange={v => updateTweak('m6LogoSize', v)} />
            <TweakSlider label="Breathing duration"
              value={tweaks.m6BreatheDur} min={0.8} max={4.0} step={0.1} suffix=" s"
              hint="Lower = faster pulse"
              onChange={v => updateTweak('m6BreatheDur', Math.round(v * 10) / 10)} />
          </div>
        </div>
      )}

    </div>
  );
}

function TweakSlider({ label, value, min, max, step, suffix='', hint, onChange }) {
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between',
        alignItems: 'baseline', marginBottom: 6 }}>
        <label style={{ fontSize: 11.5, color: FG, fontWeight: 500 }}>{label}</label>
        <span style={{ fontSize: 10.5, color: '#60CDFF',
          fontFamily:'"Cascadia Mono", Consolas, monospace', fontWeight: 500 }}>
          {typeof value === 'number' && step < 1 ? value.toFixed(1) : value}{suffix}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ width: '100%', accentColor: '#60CDFF' }} />
      {hint && <div style={{ fontSize: 10, color: FG_DIM, marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
