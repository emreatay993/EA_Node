<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edge Crossing Visual Variants</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 22px; color: #b8c0ff; }
  .subtitle { text-align: center; margin-bottom: 28px; font-size: 13px; color: #888; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
  .variant { background: #16213e; border-radius: 12px; padding: 16px; border: 1px solid #2a3a5c; }
  .variant h2 { font-size: 14px; color: #7ec8e3; margin-bottom: 4px; }
  .variant .desc { font-size: 11px; color: #999; margin-bottom: 10px; line-height: 1.4; }
  .variant .pros { font-size: 11px; color: #6ecf6e; margin-bottom: 2px; }
  .variant .cons { font-size: 11px; color: #cf6e6e; margin-bottom: 8px; }
  svg { width: 100%; border-radius: 8px; background: #0f1629; display: block; }
  .recommended { border-color: #4ea14e; box-shadow: 0 0 12px rgba(78,161,78,0.15); }
  .recommended h2::after { content: " (Recommended)"; color: #4ea14e; font-size: 11px; }
  .node-rect { stroke: #555; stroke-width: 1; }
  .node-label { fill: #ddd; font: 11px 'Segoe UI', system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; }
  .legend-line { stroke-width: 2.5; }
  .legend-text { fill: #bbb; font: 10px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<h1>Edge Crossing Differentiation Variants</h1>
<p class="subtitle">Simplified crossing scenario from your dene3.sfe graph &mdash; each panel shows a different technique</p>
<div class="grid" id="grid"></div>

<script>
const W = 540, H = 280;

const nodes = [
  { id: 'A', label: 'DPF Model',        x: 30,  y: 60,  w: 120, h: 50, color: '#3a6a8a' },
  { id: 'B', label: 'DPF Result File',   x: 30,  y: 170, w: 120, h: 50, color: '#5a4a8a' },
  { id: 'C', label: 'Mesh Scoping',      x: 360, y: 40,  w: 130, h: 50, color: '#5a7a4a' },
  { id: 'D', label: 'Result Field',      x: 360, y: 130, w: 130, h: 50, color: '#8a5a3a' },
  { id: 'E', label: 'DPF Viewer',        x: 360, y: 210, w: 120, h: 50, color: '#6a3a6a' },
];

const edgeDefs = [
  { src: 'A', tgt: 'C', type: 'exec',  srcY: 0.3, tgtY: 0.5 },
  { src: 'A', tgt: 'D', type: 'model', srcY: 0.5, tgtY: 0.5 },
  { src: 'A', tgt: 'E', type: 'model', srcY: 0.7, tgtY: 0.3 },
  { src: 'B', tgt: 'C', type: 'data',  srcY: 0.3, tgtY: 0.5 },
  { src: 'B', tgt: 'D', type: 'exec',  srcY: 0.5, tgtY: 0.5 },
  { src: 'B', tgt: 'E', type: 'data',  srcY: 0.7, tgtY: 0.7 },
];

function getNode(id) { return nodes.find(n => n.id === id); }

const edgeData = edgeDefs.map(ed => {
  const sn = getNode(ed.src), tn = getNode(ed.tgt);
  return {
    src: { x: sn.x + sn.w, y: sn.y + sn.h * ed.srcY },
    tgt: { x: tn.x, y: tn.y + tn.h * ed.tgtY },
    type: ed.type,
  };
});

function typeColor(type) {
  return type === 'exec' ? '#f0c040' : type === 'model' ? '#60a0f0' : '#80d080';
}

function bezPath(src, tgt) {
  const dx = Math.abs(tgt.x - src.x);
  const lead = Math.max(40, dx * 0.4);
  return `M ${src.x} ${src.y} C ${src.x+lead} ${src.y}, ${tgt.x-lead} ${tgt.y}, ${tgt.x} ${tgt.y}`;
}

function cubicPt(t, src, tgt) {
  const dx = Math.abs(tgt.x - src.x), lead = Math.max(40, dx * 0.4);
  const p0 = src, p1 = {x:src.x+lead,y:src.y}, p2 = {x:tgt.x-lead,y:tgt.y}, p3 = tgt;
  const u = 1-t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y,
  };
}

function bezTangent(t, src, tgt) {
  const dx = Math.abs(tgt.x - src.x), lead = Math.max(40, dx * 0.4);
  const p0 = src, p1 = {x:src.x+lead,y:src.y}, p2 = {x:tgt.x-lead,y:tgt.y}, p3 = tgt;
  const u = 1-t;
  return {
    x: 3*u*u*(p1.x-p0.x) + 6*u*t*(p2.x-p1.x) + 3*t*t*(p3.x-p2.x),
    y: 3*u*u*(p1.y-p0.y) + 6*u*t*(p2.y-p1.y) + 3*t*t*(p3.y-p2.y),
  };
}

// Find crossings
function segCross(a1, a2, b1, b2) {
  const dx1=a2.x-a1.x, dy1=a2.y-a1.y, dx2=b2.x-b1.x, dy2=b2.y-b1.y;
  const d = dx1*dy2 - dy1*dx2;
  if (Math.abs(d) < 0.01) return null;
  const t = ((b1.x-a1.x)*dy2 - (b1.y-a1.y)*dx2) / d;
  const u = ((b1.x-a1.x)*dy1 - (b1.y-a1.y)*dx1) / d;
  if (t>=0&&t<=1&&u>=0&&u<=1) return { x: a1.x+t*dx1, y: a1.y+t*dy1 };
  return null;
}

function sampleBez(e, N) {
  const pts = [];
  for (let i = 0; i <= N; i++) { const t = i/N; pts.push({...cubicPt(t, e.src, e.tgt), t}); }
  return pts;
}

function findCrossings(e1, e2) {
  const N = 30, pts1 = sampleBez(e1, N), pts2 = sampleBez(e2, N), hits = [];
  for (let i = 0; i < N; i++)
    for (let j = 0; j < N; j++) {
      const c = segCross(pts1[i], pts1[i+1], pts2[j], pts2[j+1]);
      if (c) hits.push({ t1: (pts1[i].t+pts1[i+1].t)/2, t2: (pts2[j].t+pts2[j+1].t)/2, x:c.x, y:c.y });
    }
  return hits;
}

const allCrossings = [];
for (let i = 0; i < edgeData.length; i++)
  for (let j = i+1; j < edgeData.length; j++)
    findCrossings(edgeData[i], edgeData[j]).forEach(h => allCrossings.push({i,j,...h}));

function nodesMarkup() {
  return nodes.map(n =>
    `<rect class="node-rect" x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="6" fill="${n.color}"/>` +
    `<text class="node-label" x="${n.x+n.w/2}" y="${n.y+n.h/2}">${n.label}</text>`
  ).join('');
}

function legendMarkup() {
  const items = [['Exec/Flow','#f0c040'],['Model ref','#60a0f0'],['Data','#80d080']];
  return items.map(([label, color], i) =>
    `<line class="legend-line" x1="${W-110}" y1="${H-42+i*15}" x2="${W-92}" y2="${H-42+i*15}" stroke="${color}"/>` +
    `<text class="legend-text" x="${W-86}" y="${H-38+i*15}">${label}</text>`
  ).join('');
}

function svgWrap(content) {
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${nodesMarkup()}${content}${legendMarkup()}</svg>`;
}

// Build a polyline path from sampled bezier (for gap/jump variants)
function sampledPath(e, N) {
  const pts = sampleBez(e, N);
  return 'M ' + pts.map(p => `${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' L ');
}

// Jump arc SVG: draw edge as segments with arc jumps
function jumpEdgeSVG(e, ei, radius) {
  const crossings = allCrossings.filter(c => c.j === ei).map(c => ({t:c.t2, x:c.x, y:c.y})).sort((a,b) => a.t - b.t);
  if (crossings.length === 0) return `<path d="${bezPath(e.src, e.tgt)}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;

  const N = 100, pts = sampleBez(e, N);
  let paths = '';
  let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
  let ci = 0;
  for (let s = 1; s <= N; s++) {
    if (ci < crossings.length && Math.abs(pts[s].t - crossings[ci].t) < 0.035) {
      // End current segment
      paths += `<path d="${d}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
      // Draw arc
      const cx = crossings[ci].x, cy = crossings[ci].y;
      const tang = bezTangent(crossings[ci].t, e.src, e.tgt);
      const angle = Math.atan2(tang.y, tang.x);
      // SVG arc: start and end points of the semicircle
      const ax1 = cx - Math.cos(angle) * radius, ay1 = cy - Math.sin(angle) * radius;
      const ax2 = cx + Math.cos(angle) * radius, ay2 = cy + Math.sin(angle) * radius;
      // Perpendicular direction for the arc (always go "up" relative to edge direction)
      const sweep = 1;
      paths += `<path d="M ${ax1.toFixed(1)} ${ay1.toFixed(1)} A ${radius} ${radius} 0 0 ${sweep} ${ax2.toFixed(1)} ${ay2.toFixed(1)}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
      // Start new segment from arc end
      const rt = Math.min(1, crossings[ci].t + 0.035);
      const rp = cubicPt(rt, e.src, e.tgt);
      d = `M ${rp.x.toFixed(1)} ${rp.y.toFixed(1)}`;
      ci++;
    } else {
      d += ` L ${pts[s].x.toFixed(1)} ${pts[s].y.toFixed(1)}`;
    }
  }
  paths += `<path d="${d}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  return paths;
}

// Gap edge SVG: draw edge with gaps where crossed by later edges
function gapEdgeSVG(e, ei, halfGap) {
  const gapTs = allCrossings.filter(c => c.i === ei).map(c => ({t:c.t1})).sort((a,b) => a.t - b.t);
  if (gapTs.length === 0) return `<path d="${bezPath(e.src, e.tgt)}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;

  const N = 100, pts = sampleBez(e, N);
  const skipRanges = gapTs.map(g => ({lo: g.t - halfGap, hi: g.t + halfGap}));
  let paths = '', d = '', drawing = false;
  for (let s = 0; s <= N; s++) {
    const inGap = skipRanges.some(r => pts[s].t >= r.lo && pts[s].t <= r.hi);
    if (!inGap) {
      if (!drawing) { d = `M ${pts[s].x.toFixed(1)} ${pts[s].y.toFixed(1)}`; drawing = true; }
      else d += ` L ${pts[s].x.toFixed(1)} ${pts[s].y.toFixed(1)}`;
    } else if (drawing) {
      paths += `<path d="${d}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
      drawing = false;
    }
  }
  if (drawing) paths += `<path d="${d}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  return paths;
}

const variants = [
  {
    title: '1. Baseline (No Treatment)',
    desc: 'Current look: color-coded bezier curves only. Crossings are ambiguous &mdash; hard to trace which edge goes where.',
    pros: '+ Simple, fast rendering',
    cons: '- Hard to trace individual edges through crossings',
    rec: false,
    svg() {
      return svgWrap(edgeData.map(e =>
        `<path d="${bezPath(e.src, e.tgt)}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" opacity="0.85" stroke-linecap="round"/>`
      ).join(''));
    }
  },
  {
    title: '2. Jump / Arc Over',
    desc: 'One edge draws a small semicircular arc where it crosses another. Classic technique from circuit/electrical diagrams.',
    pros: '+ Instantly clear which edge is which; industry-standard pattern',
    cons: '- Needs crossing detection; can look busy with many crossings',
    rec: true,
    svg() {
      return svgWrap(edgeData.map((e, i) => jumpEdgeSVG(e, i, 8)).join(''));
    }
  },
  {
    title: '3. Gap / Bridge Break',
    desc: 'The "under" edge has a small gap where the "over" edge crosses it. Clean visual break without extra geometry.',
    pros: '+ Very clean look; easy to implement; no extra geometry needed',
    cons: '- Gap might be missed at very low zoom levels',
    rec: true,
    svg() {
      return svgWrap(edgeData.map((e, i) => gapEdgeSVG(e, i, 0.04)).join(''));
    }
  },
  {
    title: '4. Dash Pattern by Type',
    desc: 'Each edge type uses a different dash pattern: solid for exec, dashed for model, dotted for data. Two visual channels.',
    pros: '+ Works even in grayscale or for colorblind users',
    cons: '- Dashed lines can feel less polished; 3+ patterns hard to distinguish',
    rec: false,
    svg() {
      const dashes = { exec: '', model: '10 5', data: '3 4' };
      return svgWrap(edgeData.map(e =>
        `<path d="${bezPath(e.src, e.tgt)}" stroke="${typeColor(e.type)}" stroke-width="${e.type==='exec'?2.5:2}" fill="none" stroke-linecap="round" stroke-dasharray="${dashes[e.type]}"/>`
      ).join(''));
    }
  },
  {
    title: '5. Thickness + Shadow Layering',
    desc: 'Exec edges are thick with dark outlines. Data edges are thin. Clear visual depth/stacking order at crossings.',
    pros: '+ Clear hierarchy; "important" edges always on top and traceable',
    cons: '- Shadow rendering cost; can look heavy with many edges',
    rec: false,
    svg() {
      const lws = { data: 1.5, model: 2.5, exec: 4 };
      const order = ['data', 'model', 'exec'];
      let content = '';
      order.forEach(type => {
        edgeData.filter(e => e.type === type).forEach(e => {
          const d = bezPath(e.src, e.tgt);
          content += `<path d="${d}" stroke="#080c18" stroke-width="${lws[type]+4}" fill="none" stroke-linecap="round"/>`;
          content += `<path d="${d}" stroke="${typeColor(type)}" stroke-width="${lws[type]}" fill="none" stroke-linecap="round"/>`;
        });
      });
      return svgWrap(content);
    }
  },
  {
    title: '6. Glow on Hover (Interactive)',
    desc: 'All edges dim by default. Hovering highlights one edge brightly and fades others. Try it &mdash; move your mouse over the edges!',
    pros: '+ Zero crossing ambiguity when interacting; elegant and minimal',
    cons: '- Only helps interactively; static view still ambiguous',
    rec: true,
    svg() {
      let defs = `<defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>`;
      let edges = edgeData.map((e, i) => {
        const d = bezPath(e.src, e.tgt);
        return `<path class="hover-edge" data-idx="${i}" d="${d}" stroke="${typeColor(e.type)}" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2" style="transition: opacity 0.15s, stroke-width 0.15s"/>`;
      }).join('');
      // Highlight edge 2 by default
      edges = edges.replace('data-idx="2"', 'data-idx="2" filter="url(#glow)" opacity="1" stroke-width="3.5"');
      let script = `<script>
        document.querySelectorAll('.hover-edge').forEach(el => {
          el.addEventListener('mouseenter', () => {
            document.querySelectorAll('.hover-edge').forEach(e => { e.setAttribute('opacity','0.15'); e.setAttribute('stroke-width','1.5'); e.removeAttribute('filter'); });
            el.setAttribute('opacity','1'); el.setAttribute('stroke-width','3.5'); el.setAttribute('filter','url(#glow)');
          });
        });
      <\/script>`;
      return svgWrap(defs + edges + `<text x="8" y="${H-6}" fill="#666" font-size="10" font-family="Segoe UI">Hover an edge to highlight</text>`) + script;
    }
  },
  {
    title: '7. Tapered / Gradient Edges',
    desc: 'Each edge tapers from thick (source) to thin (target) with fading opacity. Direction obvious, crossings easier to untangle.',
    pros: '+ Shows flow direction without arrowheads; edges identifiable by taper',
    cons: '- Heavier rendering (many segments); may feel "busy" in dense graphs',
    rec: false,
    svg() {
      let content = '';
      edgeData.forEach(e => {
        const N = 20;
        for (let i = 0; i < N; i++) {
          const t0 = i/N, t1 = (i+1)/N;
          const p0 = cubicPt(t0, e.src, e.tgt), p1 = cubicPt(t1, e.src, e.tgt);
          const lw = 5 * (1 - t0 * 0.75);
          const op = 0.4 + 0.6 * (1 - t0);
          content += `<line x1="${p0.x.toFixed(1)}" y1="${p0.y.toFixed(1)}" x2="${p1.x.toFixed(1)}" y2="${p1.y.toFixed(1)}" stroke="${typeColor(e.type)}" stroke-width="${lw.toFixed(1)}" opacity="${op.toFixed(2)}" stroke-linecap="round"/>`;
        }
      });
      return svgWrap(content);
    }
  },
  {
    title: '8. Combo: Jump + Thickness + Glow',
    desc: 'Arc jumps at crossings, thickness hierarchy by type, and subtle glow on exec edges. A production-grade combined solution.',
    pros: '+ Multiple visual cues stack for maximum clarity at all zoom levels',
    cons: '- Most complex to implement; combines three separate systems',
    rec: true,
    svg() {
      const lws = { data: 1.5, model: 2, exec: 3.5 };
      let defs = `<defs><filter id="execglow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
      let content = defs;
      const order = ['data', 'model', 'exec'];
      order.forEach(type => {
        edgeData.map((e,i) => ({e,i})).filter(({e}) => e.type === type).forEach(({e, i: ei}) => {
          const higherTypes = type === 'data' ? ['model','exec'] : type === 'model' ? ['exec'] : [];
          const jumpTs = [];
          allCrossings.forEach(c => {
            if (c.i === ei && higherTypes.includes(edgeData[c.j].type))
              jumpTs.push({t:c.t1, x:c.x, y:c.y});
            if (c.j === ei && higherTypes.includes(edgeData[c.i].type))
              jumpTs.push({t:c.t2, x:c.x, y:c.y});
          });
          jumpTs.sort((a,b) => a.t - b.t);

          const d = bezPath(e.src, e.tgt);
          if (type === 'exec') {
            content += `<path d="${d}" stroke="#080c18" stroke-width="${lws[type]+3}" fill="none" stroke-linecap="round"/>`;
          }

          const filterAttr = type === 'exec' ? ' filter="url(#execglow)"' : '';
          if (jumpTs.length > 0) {
            // Use jump rendering
            const N = 100, pts = sampleBez(e, N), radius = 7;
            let seg = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
            let ci = 0;
            for (let s = 1; s <= N; s++) {
              if (ci < jumpTs.length && Math.abs(pts[s].t - jumpTs[ci].t) < 0.035) {
                content += `<path d="${seg}" stroke="${typeColor(type)}" stroke-width="${lws[type]}" fill="none" stroke-linecap="round"${filterAttr}/>`;
                const tang = bezTangent(jumpTs[ci].t, e.src, e.tgt);
                const angle = Math.atan2(tang.y, tang.x);
                const ax1 = jumpTs[ci].x - Math.cos(angle)*radius, ay1 = jumpTs[ci].y - Math.sin(angle)*radius;
                const ax2 = jumpTs[ci].x + Math.cos(angle)*radius, ay2 = jumpTs[ci].y + Math.sin(angle)*radius;
                content += `<path d="M ${ax1.toFixed(1)} ${ay1.toFixed(1)} A ${radius} ${radius} 0 0 1 ${ax2.toFixed(1)} ${ay2.toFixed(1)}" stroke="${typeColor(type)}" stroke-width="${lws[type]}" fill="none" stroke-linecap="round"${filterAttr}/>`;
                const rt = Math.min(1, jumpTs[ci].t + 0.035);
                const rp = cubicPt(rt, e.src, e.tgt);
                seg = `M ${rp.x.toFixed(1)} ${rp.y.toFixed(1)}`;
                ci++;
              } else {
                seg += ` L ${pts[s].x.toFixed(1)} ${pts[s].y.toFixed(1)}`;
              }
            }
            content += `<path d="${seg}" stroke="${typeColor(type)}" stroke-width="${lws[type]}" fill="none" stroke-linecap="round"${filterAttr}/>`;
          } else {
            content += `<path d="${d}" stroke="${typeColor(type)}" stroke-width="${lws[type]}" fill="none" stroke-linecap="round"${filterAttr}/>`;
          }
        });
      });
      return svgWrap(content);
    }
  },
];

// Create panels
const grid = document.getElementById('grid');
variants.forEach(v => {
  const div = document.createElement('div');
  div.className = 'variant' + (v.rec ? ' recommended' : '');
  div.innerHTML = `<h2>${v.title}</h2><div class="desc">${v.desc}</div><div class="pros">${v.pros}</div><div class="cons">${v.cons}</div>${v.svg()}`;
  grid.appendChild(div);
});
</script>
</body>
</html>
